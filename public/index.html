<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown PDF</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/prism.min.css">
</head>
<body>
  <main class="shell">
    <aside class="panel control" id="sidebar">
      <header>
        <h1>Markdown PDF</h1>
        <span id="serverState">ready</span>
      </header>

      <label class="dropzone" for="fileInput">
        <input id="fileInput" type="file" accept=".md,.markdown">
        <strong id="fileLabel">Markdownを選択</strong>
        <small id="fileMeta">.md / .markdown、最大 10 MiB</small>
      </label>

      <label class="field">
        <span>テンプレート</span>
        <select id="themeSelect">
          <option value="modern-tech" selected>modern-tech</option>
        </select>
      </label>

      <div class="toggles">
        <label><input id="mermaidToggle" type="checkbox" checked> Mermaid</label>
        <label><input id="strictToggle" type="checkbox"> 厳格モード</label>
      </div>

      <section class="format-panel" aria-label="PDF format">
        <h2>フォーマット</h2>
        <div class="toggles compact">
          <label><input id="coverToggle" type="checkbox"> 表紙</label>
          <label><input id="tocToggle" type="checkbox"> 目次</label>
          <label><input id="chapterBreakToggle" type="checkbox"> 章ごとに改ページ</label>
        </div>
        <label class="field">
          <span>ドキュメント名称</span>
          <input id="docNameInput" type="text" placeholder="設計書">
        </label>
        <div class="margin-grid">
          <label class="field">
            <span>ドキュメントコード</span>
            <input id="docCodeInput" type="text" placeholder="DOC-001">
          </label>
          <label class="field">
            <span>作成日 (YYYY/MM/DD)</span>
            <input id="docDateInput" type="text" placeholder="2026/07/31">
          </label>
        </div>
        <div class="margin-grid">
          <label class="field">
            <span>バージョン</span>
            <input id="versionInput" type="text" placeholder="v1.0">
          </label>
          <label class="field">
            <span>作成者 / 部門</span>
            <input id="ownerInput" type="text" placeholder="プラットフォームチーム">
          </label>
        </div>
        <button id="applyToCoverBtn" class="toggle-sidebar-btn" type="button" style="width: 100%; justify-content: center; height: 32px; margin-top: 8px; margin-bottom: 4px;">📝 設定値を表紙に反映</button>
        <label class="field">
          <span>用紙サイズ</span>
          <select id="pageSizeSelect">
            <option value="A4">A4</option>
            <option value="A3">A3</option>
            <option value="Letter">Letter</option>
          </select>
        </label>
        <div class="margin-grid">
          <label class="field">
            <span>上</span>
            <input id="marginTopInput" type="text" value="20mm" inputmode="decimal">
          </label>
          <label class="field">
            <span>右</span>
            <input id="marginRightInput" type="text" value="18mm" inputmode="decimal">
          </label>
          <label class="field">
            <span>下</span>
            <input id="marginBottomInput" type="text" value="18mm" inputmode="decimal">
          </label>
          <label class="field">
            <span>左</span>
            <input id="marginLeftInput" type="text" value="18mm" inputmode="decimal">
          </label>
        </div>
        <div class="toggles compact">
          <label><input id="headerToggle" type="checkbox"> ヘッダー</label>
        </div>
        <label class="field">
          <span>ヘッダーテキスト</span>
          <input id="headerFormatInput" type="text" placeholder="内部文書" value="">
        </label>
        <label class="field">
          <span>位置</span>
          <select id="headerAlignSelect">
            <option value="left">left</option>
            <option value="center">center</option>
            <option value="right">right</option>
          </select>
        </label>

        <div class="toggles compact">
          <label><input id="pageNumberToggle" type="checkbox" checked> ページ番号</label>
        </div>
        <label class="field">
          <span>フッターテキスト</span>
          <input id="footerFormatInput" type="text" value="{page} / {total}">
        </label>
        <label class="field">
          <span>位置</span>
          <select id="footerAlignSelect">
            <option value="right">right</option>
            <option value="center">center</option>
            <option value="left">left</option>
          </select>
        </label>
      </section>

      <div class="actions">
        <button id="previewBtn" type="button">プレビュー</button>
        <button id="convertBtn" type="button">PDF出力</button>
      </div>
    </aside>

    <section class="panel editor">
      <header>
        <div style="display: flex; align-items: center; gap: 8px;">
          <button id="toggleSidebarBtn" class="toggle-sidebar-btn" type="button" title="設定パネルを切り替える">⚙️ 設定</button>
          <h2>Markdown エディタ</h2>
          <span id="savedIndicator" class="saved-indicator" style="opacity: 0; transition: opacity 0.3s ease;">✓ 保存済み</span>
        </div>
        <a id="downloadLink" class="download-link-btn" href="#" hidden>📥 PDFダウンロード</a>
      </header>
      <div class="editor-body">
        <textarea id="markdownEditor" placeholder="ファイルを選択・ドラッグ、またはここにMarkdownを直接入力・編集してください..."></textarea>
      </div>
    </section>

    <section class="panel preview">
      <iframe id="previewFrame" title="preview"></iframe>
    </section>
  </main>
  <script src="/prism.min.js"></script>
  <script src="/app.js" type="module"></script>
</body>
</html>
