services:
  app:
    build: .
    init: true
    ports:
      - "8080:8080"
    volumes:
      - mdpdf-workdir:/app/workdir
      - ./public:/app/public
      - ./themes:/app/themes:ro
      - ./scripts:/app/scripts:ro
      - ./puppeteer-config.json:/app/puppeteer-config.json:ro
    environment:
      MDPDF_BIND: 0.0.0.0:8080
      MDPDF_WORKDIR: /app/workdir
      MDPDF_THEMES: /app/themes
      MDPDF_CHROMIUM: chromium-headless-shell
      MDPDF_PRINT_SCRIPT: /app/scripts/print_pdf.mjs
      MDPDF_PUPPETEER_CONFIG: /app/puppeteer-config.json
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-headless-shell
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  mdpdf-workdir:
  caddy-data:
  caddy-config:
