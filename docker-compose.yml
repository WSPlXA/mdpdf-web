services:
  app:
    build: .
    volumes:
      - mdpdf-workdir:/app/workdir
      - ./public:/app/public
    environment:
      MDPDF_BIND: 0.0.0.0:8080
      MDPDF_WORKDIR: /app/workdir
      MDPDF_THEMES: /app/themes
      MDPDF_CHROMIUM: chromium
      MDPDF_PRINT_SCRIPT: /app/scripts/print_pdf.mjs
      MDPDF_PUPPETEER_CONFIG: /app/puppeteer-config.json
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  mdpdf-workdir:
  caddy-data:
  caddy-config:
